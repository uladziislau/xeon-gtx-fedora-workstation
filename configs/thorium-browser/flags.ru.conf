# =============================================================================
# THORIUM BROWSER — флаги командной строки (XEON + NVIDIA Wayland, в духе Zen v21)
# =============================================================================
# Каждая непустая строка без # = один аргумент argv. Строки с # игнорируются при установке.
# Проверьте флаги на своей сборке: thorium --help | less
# =============================================================================

# --- Wayland + ANGLE (карты / WebGL) ---
--ozone-platform-hint=auto
--ozone-platform=wayland
--use-gl=angle
--use-angle=gl
--ignore-gpu-blocklist

# --- Видео: VA-API; AV1 отключён — VP9/H.264 под GTX 1660 SUPER (нет железного AV1) ---
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL
--disable-features=UseChromeOSDirectVideoDecoder,Av1VideoDecoder

# --- Производительность ---
--enable-gpu-rasterization
--num-raster-threads=4
--force-gpu-mem-available-mb=4096

# --- Опционально: раскомментируйте, если стабильно на вашем драйвере ---
# В Zen v21 включены обходы багов драйвера; этот флаг в Chromium их *отключает* — быстрее или нестабильнее.
#--disable-gpu-driver-bug-workarounds

# На части связок NVIDIA + Wayland даёт артефакты; при глюках видео оставьте закомментированным.
#--enable-zero-copy

# HDR — экспериментально, проверять на мониторе и контенте.
#--force-color-profile=hdr10
#--enable-hdr
