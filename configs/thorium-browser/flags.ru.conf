# =============================================================================
# THORIUM BROWSER — флаги v22 (XEON + NVIDIA Wayland, в духе Zen v21)
# =============================================================================
# СИСТЕМА: Xeon E5-2696 v3 (36 потоков) | 64 ГБ RAM | GTX 1660 SUPER | 165 Гц
# ГРАФИКА: Wayland + ANGLE (GL) | без partial raster | безопасный путь видео
# Каждая строка без # = один аргумент. Строки с # при установке игнорируются.
# Проверка: chrome://gpu → Command Line, chrome://version
# =============================================================================

# --- Wayland + ANGLE (карты / WebGL) ---
--ozone-platform-hint=auto
--ozone-platform=wayland
--use-gl=angle
--use-angle=gl
--ignore-gpu-blocklist

# --- Видео: VA-API → NVDEC; AV1 выключен (нет железного декодера на GTX 1660 SUPER) ---
# VaapiIgnoreDriverChecks — без этого nvidia-drm часто пропускается (логи в chrome://gpu)
# disable-gpu-memory-buffer-video-frames — безопасное копирование кадров, как в Zen
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks,ParallelDownloading
--disable-features=UseChromeOSDirectVideoDecoder,Av1VideoDecoder
--disable-gpu-memory-buffer-video-frames

# --- Графика: GPU raster; partial raster выкл. (мерцание при скролле на NVIDIA, аналог Zen) ---
--enable-gpu-rasterization
--disable-partial-raster
--num-raster-threads=12
--force-gpu-mem-available-mb=6144

# --- Xeon: лимит renderer-процессов (как dom.ipc.processCount = 16 в Zen) ---
--renderer-process-limit=16

# --- 64 ГБ RAM: большие кэши на tmpfs (у Chromium нет чистого RAM-кэша как у Firefox) ---
--disk-cache-dir=/tmp/thorium-cache
--disk-cache-size=16106127360
--media-cache-size=8589934592

# =============================================================================
# ОПЦИОНАЛЬНО — по одному, после стабильной работы v22
# =============================================================================
