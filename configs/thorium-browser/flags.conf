# =============================================================================
# THORIUM BROWSER — CLI flags (XEON + NVIDIA Wayland, aligned with Zen v21 goals)
# =============================================================================
# One non-comment line = one argv token. Lines starting with # are ignored.
# Validate flags on your build: thorium --help | less
# =============================================================================

# --- Wayland + ANGLE (maps / WebGL; matches Blink-side tuning) ---
--ozone-platform-hint=auto
--ozone-platform=wayland
--use-gl=angle
--use-angle=gl
--ignore-gpu-blocklist

# --- Video: VA-API path; disable AV1 so VP9/H.264 match GTX 1660 SUPER (no AV1 hw decode) ---
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL
--disable-features=UseChromeOSDirectVideoDecoder,Av1VideoDecoder

# --- Performance ---
--enable-gpu-rasterization
--num-raster-threads=4
--force-gpu-mem-available-mb=4096

# --- Optional / test if stable on your driver (uncomment by removing leading #) ---
# Zen v21 keeps driver *workarounds* enabled; this flag *disables* Chromium workarounds — may help perf or break stability.
#--disable-gpu-driver-bug-workarounds

# Can cause glitches on some NVIDIA + Wayland setups; try off first if video overlays misbehave.
#--enable-zero-copy

# Experimental HDR; verify with your display and content.
#--force-color-profile=hdr10
#--enable-hdr

# =============================================================================
# OPTIONAL (community / third-party ideas — do NOT enable together with the
# active ANGLE+GL block above; pick one graphics stack and test chrome://gpu)
# =============================================================================
# Vulkan + ANGLE (alternative to --use-angle=gl; quality varies by driver):
#--use-angle=vulkan
#--use-vulkan
# NVIDIA Wayland: some users disable dmabuf video frames to avoid crashes (test):
#--disable-gpu-memory-buffer-video-frames
# Decorations / hint (some prefer hint=wayland over auto):
#--ozone-platform-hint=wayland
#--enable-features=WaylandWindowDecorations
# Large disk cache in tmpfs (ensure /tmp is tmpfs and big enough; creates path on use):
#--disk-cache-dir=/tmp/thorium-cache
#--disk-cache-size=16106127360
#--media-cache-size=8589934592
# Network / QUIC (often already default in Chromium):
#--enable-quic
#--enable-features=ParallelDownloading
# For AV1, flags alone may be insufficient; consider extension "enhanced-h264ify"
# (Block AV1) and chrome://settings/performance — disable Memory saver.
