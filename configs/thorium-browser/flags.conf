# =============================================================================
# THORIUM BROWSER — CLI flags v22 (XEON + NVIDIA Wayland, aligned with Zen v21)
# =============================================================================
# SYSTEM: Xeon E5-2696 v3 (36 threads) | 64 GB RAM | GTX 1660 SUPER | 165 Hz
# GRAPHICS: Wayland + ANGLE (GL) | partial raster off | safe video copy path
# One non-comment line = one argv token. Lines starting with # are ignored.
# Validate on your build: chrome://gpu → Command Line, chrome://version
# =============================================================================

# --- Wayland + ANGLE (maps / WebGL; Blink stack tuned for NVIDIA on Linux) ---
--ozone-platform-hint=auto
--ozone-platform=wayland
--use-gl=angle
--use-angle=gl
--ignore-gpu-blocklist

# --- Video: VA-API → NVDEC; AV1 off (no HW decode on GTX 1660 SUPER) ---
# VaapiIgnoreDriverChecks: nvidia-drm is often skipped without this (see chrome://gpu logs)
# disable-gpu-memory-buffer-video-frames: safe copy path — mirrors Zen force-surface-zero-copy=0
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks,ParallelDownloading
--disable-features=UseChromeOSDirectVideoDecoder,Av1VideoDecoder
--disable-gpu-memory-buffer-video-frames

# --- Graphics: GPU raster; partial raster off (NVIDIA scroll flicker, like Zen max-partial-present-rects=0) ---
--enable-gpu-rasterization
--disable-partial-raster
--num-raster-threads=12
--force-gpu-mem-available-mb=6144

# --- Xeon: cap renderer processes (mirrors Zen dom.ipc.processCount = 16) ---
--renderer-process-limit=16

# --- 64 GB RAM: large caches on tmpfs (Chromium has no pure RAM cache like Firefox user.js) ---
--disk-cache-dir=/tmp/thorium-cache
--disk-cache-size=16106127360
--media-cache-size=8589934592

# =============================================================================
# OPTIONAL — test one at a time after v22 is stable (chrome://gpu, maps, YouTube)
# =============================================================================
# Driver workarounds: Zen v21 keeps them ON; this flag DISABLES Chromium workarounds.
#--disable-gpu-driver-bug-workarounds

# Zero-copy can glitch on NVIDIA + Wayland; keep off unless you verify overlays/video.
#--enable-zero-copy

# Experimental HDR; verify with your panel and content.
#--force-color-profile=hdr10
#--enable-hdr

# Alternative graphics stack (do NOT mix with active ANGLE+GL block above):
#--use-angle=vulkan
#--use-vulkan
#--ozone-platform-hint=wayland
#--enable-features=WaylandWindowDecorations

# Workstation-only: less background throttling (higher RAM/CPU on inactive tabs).
#--disable-background-timer-throttling
#--disable-renderer-backgrounding
#--disable-backgrounding-occluded-windows

# AV1 from stubborn sites: extension "enhanced-h264ify" + disable Memory saver in settings.
